# EduVeda Spring Boot Application
spring.application.name=eduveda-api
server.port=8080

# ── Supabase / PostgreSQL ──────────────────────────────────────────────────
# Direct DB connection (Transaction pooler recommended for production)
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST}:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase PostgREST API (used for RLS-aware operations)
supabase.url=${SUPABASE_URL}
supabase.anon-key=${SUPABASE_ANON_KEY}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Claude AI (Anthropic) ──────────────────────────────────────────────────
anthropic.api-key=${ANTHROPIC_API_KEY}
anthropic.model=claude-sonnet-4-6
anthropic.api-url=https://api.anthropic.com
anthropic.api-version=2023-06-01

# ── JWT ───────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=1728000000

# ── CORS ──────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.eduveda=INFO
logging.level.org.springframework.security=WARN
