name: Build Student Android APK

on:
  push:
    branches: [main]
    paths:
      - 'student-mobile/**'
      - '.github/workflows/build-student-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: student-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: student-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite web app
        run: npm run build

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync Capacitor assets
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Make Gradle executable
        run: chmod +x android/gradlew
        working-directory: student-mobile

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: student-mobile/android
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: system4learn-student-debug-apk
          path: student-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK Build Summary
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "✅ APK built successfully!"
            echo "📦 Size: $SIZE"
            echo "📥 Download from GitHub Actions → Artifacts"
          else
            echo "❌ APK not found at expected path"
            exit 1
          fi
